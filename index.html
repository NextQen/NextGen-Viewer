<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <meta name="description" content="NextGen Viewer - Premium YouTube Multi-View Dashboard for Creators.">
    <title>NextGen Viewer | Premium Multi-View Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>NextGen Viewer</h1>
        <p>Advanced YouTube Bulk Multi-View Workspace</p>
        
        <div id="ipBanner" class="ip-banner">
            🛡️ <span>IP Bypass Protection: Make sure your VPN/Proxy is ON before playing to bypass YouTube detection algorithm!</span>
        </div>

        <div class="controls">
            <input type="text" id="ytLink" placeholder="Paste YouTube Link here...">
            <input type="number" id="tabCount" placeholder="Tabs" min="1" max="25" value="4">
            <button onclick="addVideos()">Play Videos</button>
        </div>
    </header>
    
    <div id="videoContainer" class="container"></div>

    <script src="script.js"></script>
</body>
</html>
