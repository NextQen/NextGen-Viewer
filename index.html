<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NextGen Viewer - The ultimate YouTube Multi-View tool to watch multiple videos simultaneously. Boost your channel views and watch time easily.">
    <meta name="keywords" content="NextGen Viewer, YouTube Multi-View, Increase YouTube Views, YouTube Booster, Bulk YouTube Player, Watch Time Tool">
    <title>NextGen Viewer | YouTube Multi-View Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>NextGen Viewer</h1>
        <p>Ek saath bahut saare videos dekhein aur views badhayein!</p>
        <div class="controls">
            <input type="text" id="ytLink" placeholder="Paste YouTube Link here...">
            <input type="number" id="tabCount" placeholder="No. of tabs" min="1" max="15">
            <button onclick="addVideos()">Play Videos</button>
        </div>
    </header>
    
    <div id="videoContainer" class="container"></div>

    <script src="script.js"></script>
</body>
</html>
